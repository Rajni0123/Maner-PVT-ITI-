<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Offline | Maner Private ITI</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;background:#131b2e;color:#fff;padding:24px;text-align:center}
.offline-card{max-width:380px;width:100%}
.offline-icon{font-size:64px;margin-bottom:24px;opacity:0.7}
h1{font-size:24px;margin-bottom:12px;font-weight:700}
p{font-size:16px;opacity:0.7;margin-bottom:32px;line-height:1.5}
.retry-btn{display:inline-block;background:#fea619;color:#131b2e;padding:14px 32px;font-weight:700;font-size:16px;border:none;border-radius:8px;cursor:pointer;text-decoration:none}
.retry-btn:active{transform:scale(0.95)}
</style>
</head>
<body>
<div class="offline-card">
  <div class="offline-icon">📡</div>
  <h1>You're Offline</h1>
  <p>No internet connection detected. Please check your network and try again.</p>
  <a href="/" class="retry-btn" onclick="window.location.reload();return false;">Retry Connection</a>
</div>
</body>
</html>
